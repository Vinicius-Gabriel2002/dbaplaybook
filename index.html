<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="keywords" content="DBA, Oracle, SQL Server, PostgreSQL, MySQL, archivelog, redo log, locks, tablespace, backup, restore, comandos DBA, banco de dados" />
  <meta name="author" content="Vinicius Gabriel Lana" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://www.dbaplaybook.com.br/" />

  <!-- Open Graph (WhatsApp, LinkedIn, Facebook) -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.dbaplaybook.com.br/" />
  <meta property="og:title" content="DBA Playbook — Comandos do Dia a Dia para DBAs" />
  <meta property="og:description" content="Guia prático de comandos para DBAs. Oracle, SQL Server, PostgreSQL e MySQL com exemplos prontos para usar." />
  <meta property="og:locale" content="pt_BR" />

    "description": "Guia prático de comandos para DBAs. Oracle, SQL Server, PostgreSQL e MySQL.",
    "inLanguage": "pt-BR",
    "author": {
      "@type": "Person",
      "name": "Vinicius Gabriel Lana",
      "jobTitle": "DBA Sênior & CTO",
      "worksFor": {
        "@type": "Organization",
        "name": "MigraTI Soluções em TI",
        "url": "https://www.migrati.com.br"
      }

  <!-- JSON-LD dinâmico por tópico (atualizado via JS) -->

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo" onclick="showWelcomeScreen()" role="button" tabindex="0" style="cursor:pointer">
        <svg class="logo-svg" width="26" height="26" viewBox="0 0 26 26" fill="none">
          <ellipse cx="13" cy="6.5" rx="8" ry="3"/>
          <path d="M5 6.5v13M21 6.5v13" stroke-linecap="round"/>
          <ellipse cx="13" cy="13" rx="8" ry="3"/>
          <ellipse cx="13" cy="19.5" rx="8" ry="3"/>
        </svg>
        <span class="logo-text">DBA<strong>Playbook</strong></span>
      </div>
      <div class="sidebar-actions">
        <button class="theme-toggle" id="themeToggle" aria-label="Alternar tema" title="Alternar tema">
          <svg class="icon-sun" width="17" height="17" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="5" stroke-width="2"/>
            <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <svg class="icon-moon" width="17" height="17" viewBox="0 0 24 24" fill="none">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Fechar menu">&#10005;</button>
      </div>
    </div>

    <div class="search-wrapper">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="searchInput" class="search-input" placeholder="Buscar comandos..." autocomplete="off" />
      <button class="search-clear" id="searchClear" aria-label="Limpar busca">&#10005;</button>
    </div>

    <nav class="nav" id="nav"></nav>

    <div class="sidebar-bottom">
      <button class="admin-lock-btn" id="adminLockBtn" title="Acesso admin">
        <svg id="lockIcon" width="15" height="15" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span id="adminLockLabel">Admin</span>
      </button>
    </div>
  </aside>

  <!-- OVERLAY (mobile) -->
  <div class="overlay" id="overlay"></div>

  <!-- MAIN -->
  <main class="main" id="main">
    <div class="topbar">
      <button class="menu-btn" id="menuBtn" aria-label="Abrir menu">&#9776;</button>
      <button class="back-btn hidden" id="backBtn">&#8592; Voltar</button>
    </div>

    <div class="content-area" id="contentArea">
      <div class="welcome" id="welcome">
        <div class="welcome-inner">
          <div class="welcome-logo">
            <svg width="52" height="52" viewBox="0 0 26 26" fill="none" class="logo-svg-lg">
              <ellipse cx="13" cy="6.5" rx="8" ry="3"/>
              <path d="M5 6.5v13M21 6.5v13" stroke-linecap="round"/>
              <ellipse cx="13" cy="13" rx="8" ry="3"/>
              <ellipse cx="13" cy="19.5" rx="8" ry="3"/>
            </svg>
          </div>
          <h1>DBA<strong>Playbook</strong></h1>
          <p class="welcome-sub">Seu guia rápido de comandos para o dia a dia</p>
          <div class="welcome-cards" id="welcomeCards"></div>

          <div class="author-card">
            <div class="author-avatar">VL</div>
            <div class="author-info">
              <div class="author-name">Vinicius Gabriel Lana</div>
              <div class="author-role">Sócio &amp; CTO · <a href="https://www.migrati.com.br" target="_blank" rel="noopener" class="author-link-inline">MigraTI Soluções em TI</a></div>
              <div class="author-bio">8 anos como DBA — Oracle, SQL Server, PostgreSQL e MySQL</div>
              <div class="author-certs">
                <span class="author-cert">Oracle Certified</span>
                <span class="author-cert">SQL Server Certified</span>
              </div>
              <div class="author-links">
                <a href="mailto:vinicius.gabriel@migrati.com.br" class="author-link">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="2" y="4" width="20" height="16" rx="2" stroke="currentColor" stroke-width="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" stroke="currentColor" stroke-width="2"/></svg>
                  vinicius.gabriel@migrati.com.br
                </a>
                <a href="https://www.linkedin.com/in/vinicius-gabriel-lana-abb98b18a/" target="_blank" rel="noopener" class="author-link">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><rect x="2" y="9" width="4" height="12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="4" cy="4" r="2" stroke="currentColor" stroke-width="2"/></svg>
                  LinkedIn
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>

      <article class="topic-view hidden" id="topicView"></article>
      <div class="search-results hidden" id="searchResults"></div>
    </div>
  </main>

  <!-- TOAST -->
  <div class="toast hidden" id="toast"></div>

  <!-- MODAL: EDITOR DE TÓPICO -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Novo Tópico</h2>
        <button class="modal-close-btn" id="modalCloseBtn">&#10005;</button>
      </div>
      <div class="modal-body">
        <div class="form-group" id="formCatGroup">
          <label class="form-label">Banco de dados</label>
          <select class="form-select" id="formCat"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Título</label>
          <input type="text" class="form-input" id="formTitle" placeholder="Ex: Como criar um índice" />
        </div>
        <div class="form-group">
          <label class="form-label">Descrição curta</label>
          <textarea class="form-textarea" id="formDesc" rows="2" placeholder="Explique em uma frase o que esse tópico faz"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Tags <span class="form-hint">(separadas por vírgula)</span></label>
          <input type="text" class="form-input" id="formTags" placeholder="Ex: índice, performance, criação" />
        </div>
        <div class="form-group">
          <label class="form-label">Nota de introdução <span class="form-hint">(opcional)</span></label>
          <select class="form-select" id="formNoteType" style="max-width:220px">
            <option value="">Sem nota</option>
            <option value="warning">⚠️ Atenção</option>
            <option value="info">ℹ️ Informação</option>
            <option value="tip">💡 Dica</option>
            <option value="result">✅ Resultado esperado</option>
          </select>
          <textarea class="form-textarea" id="formNoteText" rows="2" placeholder="Texto da nota..." style="display:none;margin-top:8px"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Passos</label>
          <div id="stepsContainer"></div>
          <button type="button" class="add-step-btn" id="addStepBtn">+ Adicionar Passo</button>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="modalCancelBtn">Cancelar</button>
        <button class="btn-primary" id="modalSaveBtn">Salvar e Publicar</button>
      </div>
    </div>
  </div>

  <!-- MODAL: LOGIN ADMIN -->
  <div class="modal-overlay hidden" id="loginModal">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2 class="modal-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style="vertical-align:middle;margin-right:8px"><rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          Acesso Admin
        </h2>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Senha</label>
          <input type="password" class="form-input" id="loginPassword" placeholder="Digite a senha" />
          <div class="form-error" id="loginError"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="loginCancelBtn">Cancelar</button>
        <button class="btn-primary" id="loginSubmitBtn">Entrar</button>
      </div>
    </div>
  </div>

  <script src="content.js"></script>
  <script src="app.js"></script>
</body>
</html>
