<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DBA Playbook</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo" onclick="showWelcomeScreen()" role="button" tabindex="0" style="cursor:pointer">
        <svg class="logo-svg" width="26" height="26" viewBox="0 0 26 26" fill="none">
          <ellipse cx="13" cy="6.5" rx="8" ry="3"/>
          <path d="M5 6.5v13M21 6.5v13" stroke-linecap="round"/>
          <ellipse cx="13" cy="13" rx="8" ry="3"/>
          <ellipse cx="13" cy="19.5" rx="8" ry="3"/>
        </svg>
        <span class="logo-text">DBA<strong>Playbook</strong></span>
      </div>
      <div class="sidebar-actions">
        <button class="theme-toggle" id="themeToggle" aria-label="Alternar tema" title="Alternar tema">
          <svg class="icon-sun" width="17" height="17" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="5" stroke-width="2"/>
            <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <svg class="icon-moon" width="17" height="17" viewBox="0 0 24 24" fill="none">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Fechar menu">&#10005;</button>
      </div>
    </div>

    <div class="search-wrapper">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="searchInput" class="search-input" placeholder="Buscar comandos..." autocomplete="off" />
      <button class="search-clear" id="searchClear" aria-label="Limpar busca">&#10005;</button>
    </div>

    <nav class="nav" id="nav"></nav>
  </aside>

  <!-- OVERLAY (mobile) -->
  <div class="overlay" id="overlay"></div>

  <!-- MAIN -->
  <main class="main" id="main">
    <div class="topbar">
      <button class="menu-btn" id="menuBtn" aria-label="Abrir menu">&#9776;</button>
      <button class="back-btn hidden" id="backBtn">&#8592; Voltar</button>
    </div>

    <div class="content-area" id="contentArea">
      <!-- Home / Welcome -->
      <div class="welcome" id="welcome">
        <div class="welcome-inner">
          <div class="welcome-logo">
            <svg width="52" height="52" viewBox="0 0 26 26" fill="none" class="logo-svg-lg">
              <ellipse cx="13" cy="6.5" rx="8" ry="3"/>
              <path d="M5 6.5v13M21 6.5v13" stroke-linecap="round"/>
              <ellipse cx="13" cy="13" rx="8" ry="3"/>
              <ellipse cx="13" cy="19.5" rx="8" ry="3"/>
            </svg>
          </div>
          <h1>DBA<strong>Playbook</strong></h1>
          <p class="welcome-sub">Seu guia rápido de comandos para o dia a dia</p>
          <div class="welcome-cards" id="welcomeCards"></div>
        </div>
      </div>

      <!-- Topic View -->
      <article class="topic-view hidden" id="topicView"></article>

      <!-- Search Results -->
      <div class="search-results hidden" id="searchResults"></div>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
      <div class="footer-inner">
        <div class="footer-left">
          <div class="footer-name">Vinicius Gabriel Lana</div>
          <div class="footer-company">Sócio &amp; CTO · MigraTI Soluções em TI · 8 anos de experiência</div>
        </div>
        <div class="footer-center">
          <span class="footer-cert">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
            Oracle Certified
          </span>
          <span class="footer-cert">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
            SQL Server Certified
          </span>
        </div>
        <div class="footer-right">
          <a href="mailto:vinicius.gabriel@migrati.com.br" class="footer-link">vinicius.gabriel@migrati.com.br</a>
          <a href="https://www.linkedin.com/in/vinicius-gabriel-lana-abb98b18a/" target="_blank" rel="noopener" class="footer-linkedin">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><rect x="2" y="9" width="4" height="12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="4" cy="4" r="2" stroke="currentColor" stroke-width="2"/></svg>
            LinkedIn
          </a>
        </div>
      </div>
    </footer>
  </main>

  <script src="content.js"></script>
  <script src="app.js"></script>
</body>
</html>
